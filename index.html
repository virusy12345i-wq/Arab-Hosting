<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>NoVaX RP | النظام المتكامل</title>
</head>
<body class="bg-[#050505] text-white font-sans">
    
    <nav class="p-6 border-b border-[#1a1a1a] flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0">
        <div class="text-3xl font-black text-[#9403fc]">NoVaX</div>
        <div class="space-x-4 space-x-reverse">
            <button onclick="checkStatus('apply')" class="hover:text-[#9403fc] transition">التقديم</button>
            <button onclick="checkStatus('jobs')" class="hover:text-[#9403fc] transition">الوظائف</button>
            <a href="/login" class="bg-[#9403fc] px-6 py-2 rounded-lg font-bold">دخول ديسكورد</a>
        </div>
    </nav>

    <main class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-8xl font-black mb-6 tracking-tighter shadow-2xl">الواقعية <span class="text-[#9403fc]">المطلقة</span></h1>
        <p class="text-gray-500 max-w-xl text-lg">نظام NoVaX المتطور للتحقق والتوظيف. لا مكان للضعفاء هنا.</p>
        
        <div id="apply-section" class="mt-12 w-full max-w-lg bg-[#0d0d0d] p-8 rounded-3xl border border-[#1a1a1a]">
            <h2 class="text-2xl font-bold mb-4">تقديم طلب تفعيل</h2>
            <textarea id="app-data" class="w-full bg-black border border-[#222] p-4 rounded-xl mb-4 h-32 focus:border-[#9403fc] outline-none" placeholder="اكتب سبب انضمامك..."></textarea>
            <button onclick="submitApp()" class="w-full bg-[#53fc18] text-black font-black py-4 rounded-xl hover:scale-105 transition">إرسال الطلب عبر الويب هوك</button>
        </div>
    </main>

    <script>
        async function submitApp() {
            const data = document.getElementById('app-data').value;
            const res = await fetch('/api/apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data })
            });
            const result = await res.json();
            alert(result.m);
        }
    </script>
</body>
</html>
